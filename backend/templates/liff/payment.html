<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ชำระเงิน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

  <!-- Header -->
  <div class="bg-blue-600 text-white px-4 py-4 flex items-center gap-3 sticky top-0 z-10 shadow">
    <span class="text-2xl">💳</span>
    <div class="font-bold text-lg">ชำระเงิน</div>
  </div>

  <div class="max-w-lg mx-auto px-4 pt-6">

    <!-- Loading -->
    <div id="loading" class="text-center py-16">
      <div class="text-4xl mb-3">⏳</div>
      <div class="text-gray-500">กำลังโหลด...</div>
    </div>

    <!-- Error -->
    <div id="errorState" class="hidden text-center py-16">
      <div class="text-4xl mb-3">❌</div>
      <div class="text-gray-700 font-medium" id="errorMsg">เกิดข้อผิดพลาด</div>
      <a href="/liff/" class="mt-4 inline-block bg-blue-600 text-white px-6 py-2 rounded-xl text-sm">กลับหน้าหลัก</a>
    </div>

    <!-- Success -->
    <div id="successState" class="hidden text-center py-10 px-4">
      <div class="text-6xl mb-4">✅</div>
      <div class="text-xl font-bold text-green-700 mb-2">ส่งสลิปสำเร็จ!</div>
      <div class="text-gray-600 text-sm mb-6">ทีมงานจะตรวจสอบและยืนยันการจองของคุณภายใน 30 นาที</div>
      <a id="confirmLink" href="/liff/confirm" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-xl font-semibold">
        ดูสถานะการจอง
      </a>
    </div>

    <!-- Payment form -->
    <div id="paymentForm" class="hidden space-y-4">

      <!-- Booking summary -->
      <div class="bg-white rounded-2xl shadow p-5 space-y-2">
        <div class="text-xs text-gray-400 uppercase font-semibold mb-2">สรุปการจอง</div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">รหัส</span>
          <span class="font-bold text-blue-700" id="pRef"></span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">เช็คอิน → เช็คเอาต์</span>
          <span class="font-semibold" id="pDates"></span>
        </div>
        <hr class="border-gray-100"/>
        <div class="flex justify-between">
          <span class="font-bold text-gray-800">ยอดที่ต้องชำระ</span>
          <span class="font-bold text-blue-600 text-xl" id="pTotal"></span>
        </div>
      </div>

      <!-- Slip upload -->
      <div class="bg-white rounded-2xl shadow p-5">
        <div class="text-sm font-semibold text-gray-700 mb-4">📎 อัปโหลดสลิปการโอนเงิน</div>
        <p class="text-xs text-gray-500 mb-4">โอนเงินตามยอดที่ระบุแล้วส่งสลิปเพื่อยืนยันการจอง</p>

        <label for="slipFile"
          class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition">
          <div id="uploadPlaceholder" class="text-center">
            <div class="text-4xl mb-2">📎</div>
            <div class="text-sm text-gray-500">แตะเพื่อเลือกรูปสลิป</div>
            <div class="text-xs text-gray-400 mt-1">JPEG, PNG (สูงสุด 5MB)</div>
          </div>
          <img id="slipPreview" class="hidden w-full h-full object-contain rounded-xl" alt="slip preview"/>
          <input type="file" id="slipFile" accept="image/jpeg,image/png,image/webp" class="hidden"
            onchange="previewSlip(this)"/>
        </label>

        <div id="uploadError" class="text-red-600 text-sm mt-2 hidden"></div>

        <button id="submitBtn" onclick="submitPayment()"
          class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-xl transition text-lg disabled:opacity-50">
          ส่งสลิป
        </button>
      </div>

    </div>
  </div>

  <script>
    const APP_URL = "{{ app_url }}";
    const LIFF_ID = "{{ liff_id }}";
    let booking = null;

    async function payWithLinePay() {
      if (!booking) return;
      const btn = event.target.closest('button');
      btn.disabled = true;
      btn.textContent = 'กำลังเชื่อมต่อ LINE Pay...';

      try {
        const res = await fetch(`${APP_URL}/api/payments/linepay/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ booking_ref: booking.booking_ref }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || 'ไม่สามารถเชื่อมต่อ LINE Pay ได้');
          btn.disabled = false;
          btn.innerHTML = '&hellip; จ่ายด้วย LINE Pay';
          return;
        }
        // Redirect to LINE Pay payment page
        window.location.href = data.payment_url;
      } catch (e) {
        alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
        btn.disabled = false;
      }
    }

    let promptPayChargeId = null;
    let promptPayPoller = null;

    async function payWithPromptPay() {
      if (!booking) return;
      const btn = document.getElementById('qrBtn');
      btn.disabled = true;
      btn.textContent = 'กำลังสร้าง QR...';

      try {
        const res = await fetch(`${APP_URL}/api/payments/promptpay/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ booking_ref: booking.booking_ref }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || 'ไม่สามารถสร้าง QR ได้');
          btn.disabled = false;
          btn.textContent = 'สร้าง QR Code';
          return;
        }

        promptPayChargeId = data.charge_id;
        btn.classList.add('hidden');
        if (data.qr_url) {
          document.getElementById('qrImage').src = data.qr_url;
        }
        document.getElementById('qrArea').classList.remove('hidden');

        // Poll every 5 seconds for up to 10 minutes
        let attempts = 0;
        promptPayPoller = setInterval(async () => {
          attempts++;
          if (attempts > 120) {
            clearInterval(promptPayPoller);
            document.getElementById('qrPolling').textContent = 'หมดเวลา กรุณาลองใหม่';
            return;
          }
          const statusRes = await fetch(`${APP_URL}/api/payments/promptpay/status/${promptPayChargeId}`);
          const statusData = await statusRes.json();
          if (statusData.status === 'successful') {
            clearInterval(promptPayPoller);
            document.getElementById('qrPolling').textContent = '✅ ชำระเงินสำเร็จ! กำลังไปหน้ายืนยัน...';
            document.getElementById('qrPolling').className = 'text-sm text-green-600 font-semibold';
            setTimeout(() => {
              window.location.href = `/liff/confirm?ref=${booking.booking_ref}`;
            }, 1500);
          }
        }, 5000);
      } catch (e) {
        alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
        btn.disabled = false;
        btn.textContent = 'สร้าง QR Code';
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('คัดลอกแล้ว: ' + text);
      });
    }

    function previewSlip(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        document.getElementById('uploadError').textContent = 'ไฟล์ใหญ่เกิน 5MB';
        document.getElementById('uploadError').classList.remove('hidden');
        input.value = '';
        return;
      }
      document.getElementById('uploadError').classList.add('hidden');
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('uploadPlaceholder').classList.add('hidden');
        const preview = document.getElementById('slipPreview');
        preview.src = e.target.result;
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    async function submitPayment() {
      const file = document.getElementById('slipFile').files[0];
      const errEl = document.getElementById('uploadError');
      errEl.classList.add('hidden');

      if (!file) {
        errEl.textContent = 'กรุณาเลือกรูปสลิป';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'กำลังส่ง...';

      const formData = new FormData();
      formData.append('booking_ref', booking.booking_ref);
      formData.append('amount', booking.total_price);
      formData.append('file', file);

      try {
        const res = await fetch(`${APP_URL}/api/payments/upload-slip`, {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'ส่งสลิป';
          return;
        }
        document.getElementById('paymentForm').classList.add('hidden');
        document.getElementById('confirmLink').href = `/liff/confirm?ref=${booking.booking_ref}`;
        document.getElementById('successState').classList.remove('hidden');
      } catch (e) {
        errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'ส่งสลิป';
      }
    }

    async function loadBooking() {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      if (!ref) {
        showError('ไม่พบรหัสการจอง');
        return;
      }

      try {
        const res = await fetch(`${APP_URL}/api/bookings/${ref}`);
        if (!res.ok) {
          showError('ไม่พบการจองนี้');
          return;
        }
        booking = await res.json();

        if (booking.status === 'cancelled') {
          showError('การจองนี้ถูกยกเลิกแล้ว');
          return;
        }
        if (['confirmed', 'checked_in', 'checked_out'].includes(booking.status)) {
          showError('การจองนี้ชำระเงินแล้ว');
          return;
        }

        document.getElementById('pRef').textContent = booking.booking_ref;
        document.getElementById('pDates').textContent = `${booking.check_in} → ${booking.check_out}`;
        const totalText = `฿${Number(booking.total_price).toLocaleString()}`;
        document.getElementById('pTotal').textContent = totalText;

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('paymentForm').classList.remove('hidden');
      } catch (e) {
        showError('เกิดข้อผิดพลาด กรุณาลองใหม่');
      }
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorState').classList.remove('hidden');
    }

    async function initLiff() {
      if (!LIFF_ID) return;
      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (e) {
        console.warn('LIFF init failed:', e.message);
      }
    }

    initLiff();
    loadBooking();
  </script>
</body>
</html>
