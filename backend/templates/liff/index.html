<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จองห้องพัก</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .room-card.selected { border-color: #2563eb; background: #eff6ff; }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

  <!-- Header -->
  <div class="bg-blue-600 text-white px-4 py-4 flex items-center gap-3 sticky top-0 z-10 shadow">
    <span class="text-2xl">🏨</span>
    <div>
      <div class="font-bold text-lg leading-tight">จองห้องพัก</div>
      <div id="stepLabel" class="text-blue-200 text-xs">ขั้นตอนที่ 1 จาก 4</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="bg-blue-100 h-1">
    <div id="progressBar" class="bg-blue-600 h-1 transition-all duration-300" style="width:25%"></div>
  </div>

  <div class="max-w-lg mx-auto px-4 pt-4">

    <!-- STEP 1: Select dates -->
    <div id="step1" class="step active">
      <h2 class="text-lg font-bold text-gray-800 mb-4">เลือกวันที่เข้าพัก</h2>
      <div class="bg-white rounded-2xl shadow p-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">วันเช็คอิน</label>
          <input type="date" id="checkIn"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">วันเช็คเอาต์</label>
          <input type="date" id="checkOut"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ผู้ใหญ่</label>
            <select id="adults"
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="1">1 ท่าน</option>
              <option value="2" selected>2 ท่าน</option>
              <option value="3">3 ท่าน</option>
              <option value="4">4 ท่าน</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">เด็ก</label>
            <select id="children"
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="0" selected>ไม่มี</option>
              <option value="1">1 คน</option>
              <option value="2">2 คน</option>
              <option value="3">3 คน</option>
            </select>
          </div>
        </div>
        <div id="step1Error" class="text-red-600 text-sm hidden"></div>
        <button onclick="searchRooms()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
          ค้นหาห้องว่าง
        </button>
      </div>
    </div>

    <!-- STEP 2: Select room -->
    <div id="step2" class="step">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">เลือกห้องพัก</h2>
        <button onclick="goStep(1)" class="text-blue-600 text-sm">← แก้ไขวันที่</button>
      </div>
      <div id="roomsContainer" class="space-y-4"></div>
      <div id="step2Error" class="text-red-600 text-sm mt-2 hidden"></div>
    </div>

    <!-- STEP 3: Guest info -->
    <div id="step3" class="step">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">ข้อมูลผู้เข้าพัก</h2>
        <button onclick="goStep(2)" class="text-blue-600 text-sm">← เลือกห้องใหม่</button>
      </div>
      <div class="bg-white rounded-2xl shadow p-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
          <input type="text" id="guestName" placeholder="กรอกชื่อ-นามสกุล"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ <span class="text-red-500">*</span></label>
          <input type="tel" id="guestPhone" placeholder="08x-xxx-xxxx"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">รหัสส่วนลด (ถ้ามี)</label>
          <div class="flex gap-2">
            <input type="text" id="couponCode" placeholder="COUPON CODE"
              class="flex-1 border border-gray-300 rounded-lg px-4 py-3 uppercase focus:ring-2 focus:ring-blue-500 outline-none"/>
            <button type="button" onclick="validateCoupon()"
              class="px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm rounded-lg font-medium transition">
              ตรวจสอบ
            </button>
          </div>
          <div id="couponResult" class="mt-2 text-sm hidden"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ความต้องการพิเศษ</label>
          <textarea id="notes" rows="2" placeholder="เช่น ขอห้องชั้นสูง ต้องการเตียงเสริม"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
        </div>
        <div id="step3Error" class="text-red-600 text-sm hidden"></div>
        <button onclick="goStep(4)"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
          ถัดไป: ตรวจสอบการจอง →
        </button>
      </div>
    </div>

    <!-- STEP 4: Review & confirm -->
    <div id="step4" class="step">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">ยืนยันการจอง</h2>
        <button onclick="goStep(3)" class="text-blue-600 text-sm">← แก้ไข</button>
      </div>
      <div class="bg-white rounded-2xl shadow p-5 space-y-3 mb-4">
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">ห้อง</span>
          <span class="font-semibold text-right" id="reviewRoom">—</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">เช็คอิน</span>
          <span class="font-semibold" id="reviewCheckIn">—</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">เช็คเอาต์</span>
          <span class="font-semibold" id="reviewCheckOut">—</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">จำนวนคืน</span>
          <span class="font-semibold" id="reviewNights">—</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">ชื่อผู้จอง</span>
          <span class="font-semibold" id="reviewName">—</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500">เบอร์โทร</span>
          <span class="font-semibold" id="reviewPhone">—</span>
        </div>
        <hr class="border-gray-200"/>
        <div class="flex justify-between">
          <span class="font-bold text-gray-800">ยอดรวม</span>
          <span class="font-bold text-blue-600 text-lg" id="reviewTotal">—</span>
        </div>
      </div>
      <div id="step4Error" class="text-red-600 text-sm mb-3 hidden"></div>
      <button id="confirmBtn" onclick="confirmBooking()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-xl transition text-lg">
        ยืนยันการจอง
      </button>
      <p class="text-xs text-gray-400 text-center mt-3">การกดยืนยันถือว่าคุณยอมรับเงื่อนไขการจอง</p>
    </div>

  </div>

  <script>
    const LIFF_ID = "{{ liff_id }}";
    const APP_URL = "{{ app_url }}";
    let lineProfile = null;
    let selectedRoom = null;
    let currentStep = 1;
    let appliedCoupon = null;

    // Init LIFF
    async function initLiff() {
      if (!LIFF_ID) return;
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        lineProfile = await liff.getProfile();
        if (lineProfile.displayName) {
          document.getElementById('guestName').value = lineProfile.displayName;
        }
      } catch (e) {
        console.warn('LIFF init failed (dev mode):', e.message);
      }
    }

    function setToday() {
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('checkIn').value = fmt(today);
      document.getElementById('checkIn').min = fmt(today);
      document.getElementById('checkOut').value = fmt(tomorrow);
      document.getElementById('checkOut').min = fmt(tomorrow);
    }

    document.getElementById('checkIn').addEventListener('change', function () {
      const ci = new Date(this.value);
      ci.setDate(ci.getDate() + 1);
      const minCO = ci.toISOString().split('T')[0];
      document.getElementById('checkOut').min = minCO;
      if (document.getElementById('checkOut').value <= this.value) {
        document.getElementById('checkOut').value = minCO;
      }
    });

    async function searchRooms() {
      const ci = document.getElementById('checkIn').value;
      const co = document.getElementById('checkOut').value;
      const guests = document.getElementById('adults').value;
      const errEl = document.getElementById('step1Error');
      errEl.classList.add('hidden');

      if (!ci || !co) {
        errEl.textContent = 'กรุณาเลือกวันที่เช็คอินและเช็คเอาต์';
        errEl.classList.remove('hidden');
        return;
      }
      if (ci >= co) {
        errEl.textContent = 'วันเช็คเอาต์ต้องหลังจากวันเช็คอิน';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'กำลังค้นหา...';

      try {
        const res = await fetch(`${APP_URL}/api/rooms/available?check_in=${ci}&check_out=${co}&guests=${guests}`);
        const rooms = await res.json();

        if (rooms.length === 0) {
          errEl.textContent = 'ไม่มีห้องว่างในวันที่เลือก กรุณาเลือกวันอื่น';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'ค้นหาห้องว่าง';
          return;
        }

        renderRooms(rooms);

        // Auto-select pre-linked room if still available
        if (window._preselectedRoom) {
          const match = rooms.find(r => r.id === window._preselectedRoom.id);
          if (match) {
            selectedRoom = match;
            goStep(3);
            return;
          }
        }

        goStep(2);
      } catch (e) {
        errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        errEl.classList.remove('hidden');
      }
      btn.disabled = false;
      btn.textContent = 'ค้นหาห้องว่าง';
    }

    function renderRooms(rooms) {
      const container = document.getElementById('roomsContainer');
      container.innerHTML = rooms.map(r => {
        const coverImg = (r.images && r.images.find(i => i.is_cover)) || (r.images && r.images[0]);
        const imgSrc = coverImg ? `${APP_URL}${coverImg.url}` : 'https://placehold.co/400x250/e2e8f0/94a3b8?text=No+Image';
        const typeLabel = { standard: 'Standard', deluxe: 'Deluxe', suite: 'Suite', villa: 'Villa' }[r.type] || r.type;
        return `
          <div class="room-card bg-white rounded-2xl shadow overflow-hidden border-2 border-transparent cursor-pointer transition"
            onclick="selectRoom(${JSON.stringify(r).replace(/"/g, '&quot;')}, this)">
            <img src="${imgSrc}" alt="${r.name}" class="w-full h-48 object-cover"/>
            <div class="p-4">
              <div class="flex justify-between items-start">
                <div>
                  <div class="font-bold text-gray-800 text-base">${r.name}</div>
                  <div class="text-sm text-gray-500">${typeLabel} · สูงสุด ${r.max_guests} ท่าน</div>
                </div>
                <div class="text-right">
                  <div class="text-blue-600 font-bold">฿${Number(r.price_per_night).toLocaleString()}</div>
                  <div class="text-xs text-gray-400">/คืน</div>
                </div>
              </div>
              ${r.description ? `<p class="text-sm text-gray-600 mt-2 line-clamp-2">${r.description}</p>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function selectRoom(room, el) {
      document.querySelectorAll('.room-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedRoom = room;
      setTimeout(() => goStep(3), 300);
    }

    function goStep(n) {
      if (n === 4) {
        if (!validateStep3()) return;
        buildReview();
      }
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${n}`).classList.add('active');
      currentStep = n;
      document.getElementById('stepLabel').textContent = `ขั้นตอนที่ ${n} จาก 4`;
      document.getElementById('progressBar').style.width = `${n * 25}%`;
      window.scrollTo(0, 0);
    }

    function validateStep3() {
      const name = document.getElementById('guestName').value.trim();
      const phone = document.getElementById('guestPhone').value.trim();
      const errEl = document.getElementById('step3Error');
      if (!name) {
        errEl.textContent = 'กรุณากรอกชื่อ-นามสกุล';
        errEl.classList.remove('hidden');
        return false;
      }
      if (!phone || phone.length < 9) {
        errEl.textContent = 'กรุณากรอกเบอร์โทรศัพท์ที่ถูกต้อง';
        errEl.classList.remove('hidden');
        return false;
      }
      errEl.classList.add('hidden');
      return true;
    }

    async function validateCoupon() {
      const code = document.getElementById('couponCode').value.trim().toUpperCase();
      const resultEl = document.getElementById('couponResult');
      if (!code) {
        resultEl.className = 'mt-2 text-sm text-gray-400';
        resultEl.textContent = 'กรุณากรอกรหัสคูปอง';
        resultEl.classList.remove('hidden');
        return;
      }

      const ci = document.getElementById('checkIn').value;
      const co = document.getElementById('checkOut').value;
      const nights = ci && co ? Math.round((new Date(co) - new Date(ci)) / 86400000) : 1;
      const orderAmount = selectedRoom ? selectedRoom.price_per_night * nights : 0;

      try {
        const res = await fetch(`${APP_URL}/api/coupons/validate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, order_amount: orderAmount }),
        });
        const data = await res.json();
        if (data.valid) {
          appliedCoupon = data;
          resultEl.className = 'mt-2 text-sm text-green-600 font-medium';
          const discountText = data.discount_type === 'percent'
            ? `${data.discount_value}% = -฿${Number(data.discount_amount).toLocaleString()}`
            : `-฿${Number(data.discount_amount).toLocaleString()}`;
          resultEl.textContent = `✅ ใช้ได้! ส่วนลด ${discountText}`;
        } else {
          appliedCoupon = null;
          resultEl.className = 'mt-2 text-sm text-red-600';
          resultEl.textContent = `❌ ${data.message}`;
        }
        resultEl.classList.remove('hidden');
      } catch (e) {
        resultEl.className = 'mt-2 text-sm text-red-600';
        resultEl.textContent = 'ไม่สามารถตรวจสอบได้';
        resultEl.classList.remove('hidden');
      }
    }

    function buildReview() {
      const ci = document.getElementById('checkIn').value;
      const co = document.getElementById('checkOut').value;
      const nights = Math.round((new Date(co) - new Date(ci)) / 86400000);
      const baseTotal = selectedRoom.price_per_night * nights;
      const discount = appliedCoupon ? appliedCoupon.discount_amount : 0;
      const total = Math.max(0, baseTotal - discount);

      document.getElementById('reviewRoom').textContent = selectedRoom.name;
      document.getElementById('reviewCheckIn').textContent = ci;
      document.getElementById('reviewCheckOut').textContent = co;
      document.getElementById('reviewNights').textContent = `${nights} คืน`;
      document.getElementById('reviewName').textContent = document.getElementById('guestName').value;
      document.getElementById('reviewPhone').textContent = document.getElementById('guestPhone').value;
      document.getElementById('reviewTotal').textContent = `฿${Number(total).toLocaleString()}`;
    }

    async function confirmBooking() {
      const btn = document.getElementById('confirmBtn');
      const errEl = document.getElementById('step4Error');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'กำลังจอง...';

      const lineId = lineProfile ? lineProfile.userId : 'guest_' + Date.now();
      const payload = {
        room_id: selectedRoom.id,
        customer_line_id: lineId,
        customer_name: document.getElementById('guestName').value.trim(),
        customer_phone: document.getElementById('guestPhone').value.trim(),
        check_in: document.getElementById('checkIn').value,
        check_out: document.getElementById('checkOut').value,
        adults: parseInt(document.getElementById('adults').value),
        children_count: parseInt(document.getElementById('children').value),
        coupon_code: document.getElementById('couponCode').value.trim() || null,
        notes: document.getElementById('notes').value.trim() || null,
      };

      try {
        const res = await fetch(`${APP_URL}/api/bookings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.detail || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
          errEl.classList.remove('hidden');
          return;
        }
        window.location.href = `/liff/confirm?ref=${data.booking_ref}`;
      } catch (e) {
        errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        errEl.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.textContent = 'ยืนยันการจอง';
    }

    setToday();
    initLiff();

    // If ?room_id= is in URL, pre-fetch and skip to date selection with that room queued
    (async () => {
      const roomId = new URLSearchParams(window.location.search).get('room_id');
      if (!roomId) return;
      try {
        const res = await fetch(`${APP_URL}/api/rooms/${roomId}`);
        if (!res.ok) return;
        const room = await res.json();
        // Auto-select and skip to step 3 after dates are confirmed
        window._preselectedRoom = room;
        // Show banner so user knows which room was linked
        const banner = document.createElement('div');
        banner.className = 'bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 mb-4 text-sm text-blue-800';
        banner.innerHTML = `เลือกห้อง <strong>${room.name}</strong> — กรอกวันที่แล้วกดค้นหาเพื่อยืนยัน`;
        document.getElementById('step1').prepend(banner);
      } catch (e) { /* ignore */ }
    })();
  </script>
</body>
</html>
