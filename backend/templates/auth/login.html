<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบ - Hotel CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏨</div>
      <h1 class="text-2xl font-bold text-gray-800">Hotel CMS</h1>
      <p class="text-gray-500 text-sm mt-1">ระบบจัดการโรงแรม</p>
    </div>

    <div id="error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
        <input
          type="text" id="username" name="username" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="admin"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
        <input
          type="password" id="password" name="password" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="••••••••"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200"
      >
        เข้าสู่ระบบ
      </button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');

      const formData = new FormData();
      formData.append('username', document.getElementById('username').value);
      formData.append('password', document.getElementById('password').value);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.detail || 'เข้าสู่ระบบไม่สำเร็จ';
          errorEl.classList.remove('hidden');
          return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        document.cookie = `access_token=${data.access_token}; path=/`;
        window.location.href = '/cms/dashboard';
      } catch {
        errorEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
